<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        :root {
            --bg: #07111f;
            --surface: rgba(10, 18, 34, 0.84);
            --line: rgba(255, 255, 255, 0.14);
            --text: #edf4ff;
            --muted: #9eb1d1;
            --accent: #47e3ba;
            --accent-2: #58a7ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Plus Jakarta Sans", "Avenir Next", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 500px at 10% 0%, rgba(88, 167, 255, 0.22), transparent 55%),
                radial-gradient(900px 500px at 100% 5%, rgba(71, 227, 186, 0.18), transparent 55%),
                linear-gradient(145deg, #040812, var(--bg));
        }

        .panel {
            width: min(720px, 100%);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
        }

        .tag {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.82rem;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            max-width: 40ch;
            color: var(--muted);
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
        }

        .button-primary {
            color: #03120e;
            background: linear-gradient(135deg, var(--accent), #68f5d0);
        }

        .button-secondary {
            color: var(--text);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.05);
        }

        .code {
            margin-top: 24px;
            padding: 14px 16px;
            border: 1px dashed rgba(88, 167, 255, 0.35);
            border-radius: 16px;
            color: #bfd2f2;
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
<main class="panel">
    <span class="tag">404 · Route Not Found</span>
    <h1>This page does not exist.</h1>
    <p>The URL is not mapped by the application. Use the app entry points below instead of direct unknown routes.</p>

    <div class="actions">
        <a class="button button-primary" href="/index.html">Open Home</a>
        <a class="button button-secondary" href="/login.html">Go To Login</a>
        <a class="button button-secondary" href="/dashboard.html">Open Dashboard</a>
    </div>

    <div class="code">Valid routes: <strong>/</strong>, <strong>/login</strong>, <strong>/dashboard</strong>, <strong>/login.html</strong>, <strong>/dashboard.html</strong></div>
</main>
</body>
</html>
