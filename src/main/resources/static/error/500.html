<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Plus Jakarta Sans", "Avenir Next", "Segoe UI", sans-serif;
            color: #edf4ff;
            background: linear-gradient(145deg, #08101d, #131f38);
        }

        .panel {
            width: min(680px, 100%);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(7, 13, 25, 0.82);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 5vw, 2.8rem);
        }

        p {
            margin: 0 0 20px;
            color: #a7b9d6;
        }

        a {
            display: inline-block;
            padding: 11px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            color: #04140f;
            background: linear-gradient(135deg, #47e3ba, #68f5d0);
        }
    </style>
</head>
<body>
<main class="panel">
    <h1>Something failed on the server.</h1>
    <p>Retry the request. If it continues, restart the app and check the backend logs for the failing endpoint.</p>
    <a href="/index.html">Return Home</a>
</main>
</body>
</html>
